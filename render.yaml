# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Deploys this app as a Docker web service + a free Postgres database.
# On Render: New → Blueprint → connect this repo. Render reads this file,
# creates both resources, and wires DATABASE_URL automatically. You only fill
# in the two Shopify secrets + the app URL (see DEPLOYING.md).
#
# Note: Render's FREE Postgres is deleted after ~30 days. Fine for a sample
# app; for anything longer-lived, use a paid plan or a Neon free database
# and set DATABASE_URL manually instead of using the database block below.

databases:
  - name: sample-collection-sources-db
    plan: free
    databaseName: sample_collection_sources
    user: sample_collection_sources

services:
  - type: web
    name: sample-collection-sources
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    # No healthCheckPath: every route requires Shopify auth and would not
    # return 200 unauthenticated, so let Render do a plain open-port check.
    envVars:
      # Wired automatically from the database above.
      - key: DATABASE_URL
        fromDatabase:
          name: sample-collection-sources-db
          property: connectionString
      # Fill these in the Render dashboard (sync: false = not stored in git).
      # SHOPIFY_APP_URL is your Render URL, predictably:
      #   https://sample-collection-sources.onrender.com
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      # Optional with Shopify-managed install; harmless to set explicitly.
      - key: SCOPES
        value: write_products,write_metaobjects,write_metaobject_definitions
      # Render injects PORT itself and the server (react-router-serve) honors it,
      # so we intentionally do NOT pin PORT here.
